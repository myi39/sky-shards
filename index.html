<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky シャード予報</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff3b30">
  <link rel="apple-touch-icon" href="images/icon_sky-shards.PNG">
  <link rel="icon" type="image/png" href="images/icon_sky-shards.PNG">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="シャード予報">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
</head>
<body>
  <main class="main">
    <p class="page-label">Skyシャード予報</p>
    <section class="next-shard-section">
      <div class="next-shard-card" id="next-shard-card"></div>
    </section>

    <section class="calendar-section">
      <div class="calendar-nav">
        <button class="nav-btn" id="prev-month">&#x2039;</button>
        <h2 class="calendar-title" id="calendar-title"></h2>
        <button class="nav-btn" id="next-month">&#x203a;</button>
      </div>
      <div class="calendar-grid-wrapper">
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>
    </section>
  </main>

  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-content" id="sheet-content"></div>
  </div>

  <footer class="site-footer">
    <p>このサイトはSky 星を紡ぐ子どもたちの非公式ファンサイトです。thatgamecompanyとは関係ありません。</p>
  </footer>

  <script src="shard.js"></script>
  <script src="app.js"></script>
</body>
</html>
