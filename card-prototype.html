<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カードプロトタイプ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── 2カラムカード ── */
    .two-day-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 12px;
    }

    .col-divider {
      background: var(--separator);
      border-radius: 1px;
    }

    .day-column {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .col-header {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.2px;
      margin-bottom: 2px;
    }

    .col-reward {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 2px;
    }

    .col-sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    /* ── Occurrence Block ── */
    .occ-block {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 8px;
    }

    .occ-fill {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      border-radius: 8px;
    }

    .occ-time {
      position: relative;
      z-index: 1;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }

    /* ── 状態: 済み ── */
    .occ-block.past .occ-fill {
      width: 100%;
      background: #e5e5ea;
    }
    .occ-block.past .occ-time {
      color: var(--text-tertiary);
      font-weight: 500;
    }

    /* ── 状態: 開催中 ── */
    .occ-block.active {
      background: #FFFE86;
    }
    .occ-block.active .occ-fill {
      background: #e5e5ea; /* グレーが左から増える（経過分） */
    }
    .occ-block.active .occ-time {
      color: var(--text-primary);
      font-weight: 700;
    }

    /* ── 状態: これから ── */
    .occ-block.future {
      background: var(--bg);
    }
    .occ-block.future .occ-time {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ── 今日列（ギャップ div 使用、gap: 0 で上書き） ── */
    .today-col {
      gap: 0;
      position: relative;
      overflow: visible;
    }

    .today-col .col-sub {
      margin-bottom: 10px; /* 既存の4px + 失ったflex gap 6px を補完 */
    }

    .time-gap {
      height: 6px;
      flex-shrink: 0;
    }

    .time-indicator {
      position: absolute;
      color: #ff3b30;
      font-size: 10px;
      line-height: 1;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="main">
    <p class="page-label">カードプロトタイプ</p>

    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--text-secondary);">
      <label>時刻: <input type="time" id="mock-time" value="19:45" style="font-size:12px;"></label>
      <label>ポジション:
        <select id="mock-pos" style="font-size:12px;">
          <option value="0">0 – slot1前</option>
          <option value="1">1 – slot1中</option>
          <option value="2">2 – slot1-2間</option>
          <option value="3" selected>3 – slot2中</option>
          <option value="4">4 – slot2-3間</option>
          <option value="5">5 – slot3中</option>
          <option value="6">6 – slot3後</option>
        </select>
      </label>
    </div>

    <section class="next-shard-section">
      <div class="two-day-card" id="two-day-card"></div>
    </section>
  </main>
  <script>
    function timeToMin(hhmm) {
      const [h, m] = hhmm.split(':').map(Number);
      return h * 60 + m;
    }

    // 3回分のシャード時間定義（slot2は日跨ぎ）
    const SLOT_DEFS = [
      { startMin: timeToMin('14:15'), endMin: timeToMin('15:10'), label: '14:15 - 15:10' },
      { startMin: timeToMin('19:15'), endMin: timeToMin('20:10'), label: '19:15 - 20:10' },
      { startMin: timeToMin('23:15'), endMin: timeToMin('00:10') + 1440, label: '23:15 - 00:10' },
    ];

    const MOCK_META = {
      today:    { date: '今日 · 6/6(金)', isRed: true,  reward: '3.5本', location: 'プレーリー' },
      tomorrow: { date: '明日 · 6/7(土)', isRed: false, reward: '200',   location: '森' },
    };

    // 指定時刻から各スロットの状態とプログレスを計算
    function computeSlots(now) {
      return SLOT_DEFS.map(s => {
        // 日跨ぎスロットで早朝（00:00〜end時刻の間）の場合のみ +1440 して比較
        const n = (s.endMin > 1440 && now < s.endMin - 1440) ? now + 1440 : now;
        if (n >= s.endMin)       return { time: s.label, state: 'past',   progress: 100 };
        if (n >= s.startMin)     return { time: s.label, state: 'active', progress: Math.round((n - s.startMin) / (s.endMin - s.startMin) * 100) };
                                 return { time: s.label, state: 'future', progress: 0 };
      });
    }

    // 指定時刻からインジケーターポジション（0-6）を計算
    function computePos(now) {
      for (let i = 0; i < SLOT_DEFS.length; i++) {
        const s = SLOT_DEFS[i];
        const n = (s.endMin > 1440 && now < s.endMin - 1440) ? now + 1440 : now;
        if (n >= s.startMin && n < s.endMin) return i * 2 + 1;
      }
      if (now < SLOT_DEFS[0].startMin) return 0;
      for (let i = 0; i < SLOT_DEFS.length - 1; i++) {
        const endMin = SLOT_DEFS[i].endMin > 1440 ? SLOT_DEFS[i].endMin - 1440 : SLOT_DEFS[i].endMin;
        if (now >= endMin && now < SLOT_DEFS[i + 1].startMin) return i * 2 + 2;
      }
      return 6;
    }

    function placeIndicator(col, pos) {
      const indicator = document.createElement('span');
      indicator.textContent = '▶';
      indicator.className = 'time-indicator';
      col.appendChild(indicator);
      requestAnimationFrame(() => {
        const gaps = col.querySelectorAll('.time-gap');
        const blocks = col.querySelectorAll('.occ-block');
        const targetEl = pos % 2 === 0 ? gaps[pos / 2] : blocks[(pos - 1) / 2];
        if (!targetEl) { indicator.remove(); return; }
        indicator.style.top = (targetEl.offsetTop + targetEl.offsetHeight / 2 - 5) + 'px';
        indicator.style.left = '-12px';
      });
    }

    function buildColumn(meta, slots, isToday, pos) {
      const col = document.createElement('div');
      col.className = 'day-column' + (isToday ? ' today-col' : '');
      const badge = `<span class="shard-badge ${meta.isRed ? 'red' : 'black'}">${meta.isRed ? '🔴 赤' : '⚫ 黒'}</span>`;
      col.innerHTML = `
        <div class="col-header">${meta.date}</div>
        <div class="col-reward">${badge}<span class="reward-text">${meta.reward}</span></div>
        <div class="col-sub">${meta.location}</div>
      `;

      if (isToday) {
        for (let i = 0; i <= slots.length; i++) {
          col.appendChild(Object.assign(document.createElement('div'), { className: 'time-gap' }));
          if (i < slots.length) {
            const slot = slots[i];
            const block = document.createElement('div');
            block.className = `occ-block ${slot.state}`;
            block.innerHTML = `<div class="occ-fill" style="width:${slot.progress}%"></div><span class="occ-time">${slot.time}</span>`;
            col.appendChild(block);
          }
        }
        placeIndicator(col, pos);
      } else {
        slots.forEach(slot => {
          const block = document.createElement('div');
          block.className = `occ-block ${slot.state}`;
          block.innerHTML = `<div class="occ-fill" style="width:${slot.progress}%"></div><span class="occ-time">${slot.time}</span>`;
          col.appendChild(block);
        });
      }
      return col;
    }

    function renderCard(nowMin, pos) {
      const todaySlots = computeSlots(nowMin);
      const tomorrowSlots = SLOT_DEFS.map(s => ({ time: s.label, state: 'future', progress: 0 }));
      const card = document.getElementById('two-day-card');
      card.innerHTML = '';
      card.appendChild(buildColumn(MOCK_META.today, todaySlots, true, pos));
      card.appendChild(Object.assign(document.createElement('div'), { className: 'col-divider' }));
      card.appendChild(buildColumn(MOCK_META.tomorrow, tomorrowSlots, false, null));
    }

    const timeInput = document.getElementById('mock-time');
    const posSelect = document.getElementById('mock-pos');

    function onTimeChange() {
      const now = timeToMin(timeInput.value);
      const pos = computePos(now);
      posSelect.value = pos;
      renderCard(now, pos);
    }

    function onPosChange() {
      renderCard(timeToMin(timeInput.value), parseInt(posSelect.value));
    }

    timeInput.addEventListener('change', onTimeChange);
    posSelect.addEventListener('change', onPosChange);
    onTimeChange();
  </script>
</body>
</html>
