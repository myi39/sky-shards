name: Daily Screenshot to Discord

on:
  workflow_dispatch:       # 手動実行 + Cloudflare Worker からのトリガー
    inputs:
      target:
        description: '送信先'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod
          - both

permissions:
  contents: write

jobs:
  screenshot-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Take screenshot
        run: node scripts/screenshot.js --prod

      - name: Send or update Discord message
        run: |
          JA_TIME=$(TZ='Asia/Tokyo' date '+%-m/%-d %H:%M')

          send_to_discord() {
            local WEBHOOK_URL="$1"
            local ID_FILE="$2"

            PAYLOAD=$(jq -n \
              --arg url "${{ vars.DASHBOARD_URL }}" \
              --arg ja_time "${JA_TIME} 更新" \
              '{
                content: $ja_time,
                embeds: [
                  { image: { url: "attachment://shard_info_discord.png" } },
                  { description: ("[Webダッシュボードを開く](" + $url + ")") }
                ],
                attachments: []
              }')

            if [ -f "$ID_FILE" ]; then
              MESSAGE_ID=$(cat "$ID_FILE")
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
                -F "payload_json=$PAYLOAD" \
                -F "files[0]=@images/shard_info_discord.png" \
                "$WEBHOOK_URL/messages/$MESSAGE_ID")

              if [ "$HTTP_STATUS" = "200" ]; then
                echo "Message updated (ID: $MESSAGE_ID)"
                return 0
              fi
              echo "PATCH failed (HTTP $HTTP_STATUS), will post new message"
            fi

            RESPONSE=$(curl -s -X POST \
              -F "payload_json=$PAYLOAD" \
              -F "files[0]=@images/shard_info_discord.png" \
              "$WEBHOOK_URL")

            NEW_ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "$NEW_ID" > "$ID_FILE"
            echo "New message posted (ID: $NEW_ID)"
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
          else
            TARGET="prod"
          fi

          if [ "$TARGET" = "test" ] || [ "$TARGET" = "both" ]; then
            send_to_discord "${{ secrets.DISCORD_WEBHOOK_URL_TEST }}" ".github/discord-message-id-test"
          fi

          if [ "$TARGET" = "prod" ] || [ "$TARGET" = "both" ]; then
            send_to_discord "${{ secrets.DISCORD_WEBHOOK_URL_PROD }}" ".github/discord-message-id-prod"
          fi

      - name: Commit message ID back to repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          [ -f ".github/discord-message-id-test" ] && git add ".github/discord-message-id-test" || true
          [ -f ".github/discord-message-id-prod" ] && git add ".github/discord-message-id-prod" || true
          if git diff --staged --quiet; then
            echo "No new message ID to commit"
          else
            git commit -m "ci: update Discord message ID [skip ci]"
            git push
          fi
